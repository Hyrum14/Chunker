name: Build Windows App

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Increment version
        id: increment-version
        run: |
          [xml]$pom = Get-Content pom.xml
          $currentVersion = $pom.project.version
          Write-Host "Current version: $currentVersion"
          
          $versionParts = $currentVersion -split "\."
          $major = $versionParts[0]
          $minor = $versionParts[1]
          $patch = [int]$versionParts[2] + 1
          
          $newVersion = "$major.$minor.$patch"
          Write-Host "New version: $newVersion"
          
          $pom.project.version = $newVersion
          $pom.Save([System.IO.Path]::GetFullPath("pom.xml"))
          
          Write-Host "Version updated in pom.xml"
          # export for later steps
          echo "newVersion=$newVersion" >> $GITHUB_OUTPUT
        shell: pwsh

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '16'

      - name: Build with Maven
        run: mvn -B package

      - name: Create runtime image
        run: |
          if (Test-Path custom-runtime) { Remove-Item -Recurse -Force custom-runtime }
          jlink `
            --add-modules java.base,java.logging,java.desktop,java.prefs,java.xml,jdk.charsets `
            --output custom-runtime `
            --strip-debug `
            --no-header-files `
            --no-man-pages

      - name: Prepare app directory with source, binaries and resources
        run: |
          # start clean each time
          Remove-Item -Recurse -Force app-input -ErrorAction SilentlyContinue
          mkdir -p app-input

          # create the folders our runtime expects
          mkdir -p app-input/logs
          mkdir -p app-input/cfg

          # include source so that someone can inspect/modify it later
          mkdir -p app-input/src
          cp -Recurse src\* app-input/src\

          copy target/chunker.jar app-input/

          # Create empty config file to be filled by app on first run
          New-Item -ItemType File -Path app-input/cfg/config.properties -Force | Out-Null

      - name: Package Windows App
        run: |
          # build a clean name by stripping dots from the version
          $ver = '${{ steps.increment-version.outputs.newVersion }}' -replace '\.', ''
          $appName = "Chunker$ver"

          jpackage `
            --name $appName `
            --input app-input `
            --main-jar chunker.jar `
            --type app-image `
            --runtime-image custom-runtime `
            --dest output `
            --java-options "-Dfile.encoding=UTF-8" `
            --icon icon.ico

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: chunker-windows-app-${{ steps.increment-version.outputs.newVersion }}
          path: output/