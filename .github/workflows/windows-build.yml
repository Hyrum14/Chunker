name: Build Windows App

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Increment version
        id: increment-version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          [xml]$pom = Get-Content pom.xml
          $ns = New-Object System.Xml.XmlNamespaceManager($pom.NameTable)
          $ns.AddNamespace("pom", "http://maven.apache.org/POM/4.0.0")
          
          $versionNode = $pom.SelectSingleNode("//pom:project/pom:version", $ns)
          if ($null -eq $versionNode) {
            Write-Host "ERROR: Could not find version node"
            exit 1
          }
          
          $currentVersion = $versionNode.InnerText
          Write-Host "Current version: $currentVersion"
          
          $versionParts = $currentVersion -split "\."
          $major = $versionParts[0]
          $minor = $versionParts[1]
          $patch = [int]$versionParts[2] + 1
          
          $newVersion = "$major.$minor.$patch"
          Write-Host "New version: $newVersion"
          
          $versionNode.InnerText = $newVersion
          $pom.Save([System.IO.Path]::GetFullPath("pom.xml"))
          
          Write-Host "Version updated in pom.xml"
          
          # Commit the version increment
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git add pom.xml
          git commit -m "Increment version to $newVersion" || true
          # Configure git to use the GITHUB_TOKEN for auth
          $token = $env:GITHUB_TOKEN
          git remote set-url origin "https://x-access-token:${token}@github.com/${{ github.repository }}.git"
          git push || true
          
          # export for later steps - debug and explicit output
          Write-Host "Exporting newVersion=$newVersion"
          "newVersion=$newVersion" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          Write-Host "Output file contents:" 
          Get-Content $env:GITHUB_OUTPUT
        shell: pwsh

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '16'

      - name: Build with Maven
        run: mvn -B package

      - name: Create runtime image
        run: |
          if (Test-Path custom-runtime) { Remove-Item -Recurse -Force custom-runtime }
          jlink `
            --add-modules java.base,java.logging,java.desktop,java.prefs,java.xml,jdk.charsets `
            --output custom-runtime `
            --strip-debug `
            --no-header-files `
            --no-man-pages

      - name: Prepare app directory with source, binaries and resources
        run: |
          # start clean each time
          Remove-Item -Recurse -Force app-input -ErrorAction SilentlyContinue
          mkdir -p app-input

          # create the folders our runtime expects
          mkdir -p app-input/logs
          mkdir -p app-input/cfg

          # include source so that someone can inspect/modify it later
          mkdir -p app-input/src
          cp -Recurse src\* app-input/src\

          copy target/chunker.jar app-input/

          # Create empty config file to be filled by app on first run
          New-Item -ItemType File -Path app-input/cfg/config.properties -Force | Out-Null

      - name: Package Windows App
        run: |
          # build a clean name by stripping dots from the version
          $ver = '${{ steps.increment-version.outputs.newVersion }}' -replace '\.', ''
          $appName = "Chunker$ver"

          jpackage `
            --name $appName `
            --input app-input `
            --main-jar chunker.jar `
            --type app-image `
            --runtime-image custom-runtime `
            --dest output `
            --java-options "-Dfile.encoding=UTF-8" `
            --icon icon.ico

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: chunker-windows-app-${{ steps.increment-version.outputs.newVersion }}
          path: output/