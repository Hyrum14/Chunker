name: Build Windows App

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '16'

      - name: Build with Maven
        run: mvn -B package

      - name: Create runtime image
        run: |
          if (Test-Path custom-runtime) { Remove-Item -Recurse -Force custom-runtime }
          jlink `
            --add-modules java.base,java.logging,java.desktop,java.prefs,java.xml,jdk.charsets `
            --output custom-runtime `
            --strip-debug `
            --no-header-files `
            --no-man-pages

      - name: Prepare app directory with single JAR and resources
        run: |
          mkdir -p app-input
          mkdir -p app-input/logs
          mkdir -p app-input/cfg
          copy target/chunker.jar app-input/
          # Create empty config file to be filled by app on first run
          New-Item -ItemType File -Path app-input/cfg/config.properties -Force | Out-Null

      - name: Package Windows App
        run: |
          jpackage `
            --name Chunker `
            --input app-input `
            --main-jar chunker.jar `
            --type app-image `
            --runtime-image custom-runtime `
            --dest output `
            --java-options "-Dfile.encoding=UTF-8"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-app
          path: output/